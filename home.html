<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MV CAR - Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
    }
    header {
      background-color: #d40000;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .gallery img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    footer {
      background-color: #222;
      padding: 10px;
      text-align: center;
      color: #ccc;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    Bem-vindo ao MV CAR
  </header>

  <section class="gallery">
    <img src="img/Gemini_Generated_Image_6cwkfa6cwkfa6cwk.png" alt="Imagem oficina 1">
    <img src="img/Gemini_Generated_Image_hmbtawhmbtawhmbt.png" alt="Imagem oficina 2">
    <img src="img/Gemini_Generated_Image_u7f02hu7f02hu7f0.png" alt="Imagem oficina 3">
    <img src="img/Gemini_Generated_Image_wjam7bwjam7bwjam.png" alt="Imagem oficina 4">
  </section>

  <footer>
    &copy; 2025 MV CAR. Todos os direitos reservados.
  </footer>
</body>
</html>
